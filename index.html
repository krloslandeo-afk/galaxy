<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para ti 💛</title>
<style>
body{margin:0;overflow:hidden;background:black;font-family:sans-serif;}
#start{position:absolute;width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:white;font-size:25px;background:black;z-index:10;cursor:pointer;}
h1{position:absolute;width:100%;top:15%;text-align:center;color:yellow;font-size:45px;}
#msg{position:absolute;width:100%;bottom:15%;text-align:center;color:white;font-size:22px;}
</style>
</head>
<body>

<div id="start">Toca para ver algo bonito 💛</div>
<h1>Para ti 🌼</h1>
<div id="msg"></div>
<canvas id="c"></canvas>

<script>
let mensajes=[
"Eres mi casualidad favorita 💛",
"Iluminas mis días como el sol 🌞",
"Si pudiera darte algo, te daría mi tiempo ⏳",
"Eres más bonita que mil galaxias ✨",
"Gracias por existir 🌼",
"Eres mi pensamiento feliz 💕"
];

let msg=document.getElementById("msg");
let i=0;
setInterval(()=>{msg.innerText=mensajes[i++%mensajes.length];},3000);

let c=document.getElementById('c');
let x=c.getContext('2d');
c.width=innerWidth;
c.height=innerHeight;

let f=[];
for(let i=0;i<150;i++){
f.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*2+1,d:Math.random()*1.5});
}

function draw(){
x.fillStyle='rgba(0,0,0,0.2)';
x.fillRect(0,0,c.width,c.height);
x.fillStyle='yellow';
f.forEach(fl=>{
x.beginPath();
x.arc(fl.x,fl.y,fl.r,0,Math.PI*2);
x.fill();
});
update();
}

function update(){
f.forEach(fl=>{
fl.y+=fl.d;
fl.x+=Math.sin(fl.y*0.02);
if(fl.y>c.height){
fl.y=0;
fl.x=Math.random()*c.width;
}
});
}

setInterval(draw,30);

document.getElementById("start").onclick=function(){
this.style.display="none";
};
</script>

</body>
</html>
